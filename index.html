<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C's Prime FX | Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0d0d0d; border-right: 1px solid #222; }
        .canvas { background: #121212; border: 1px solid #333; }
        .template-card { transition: 0.3s; cursor: pointer; }
        .template-card:hover { transform: scale(1.05); border: 2px solid #6366f1; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="h-16 flex items-center justify-between px-6 border-b border-gray-800 bg-black">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">C's Prime FX</h1>
        <div class="flex gap-4">
            <button class="bg-gray-800 px-4 py-2 rounded-lg hover:bg-gray-700">Project</button>
            <button class="bg-indigo-600 px-6 py-2 rounded-lg font-bold hover:bg-indigo-500">Export Video</button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar w-64 p-4 space-y-6">
            <h2 class="text-gray-500 uppercase text-xs font-bold">Tools</h2>
            <div class="space-y-2">
                <button class="w-full text-left p-3 hover:bg-gray-900 rounded-lg">✂️ Cut & Trim</button>
                <button class="w-full text-left p-3 hover:bg-gray-900 rounded-lg">✨ AI Enhancer</button>
                <button class="w-full text-left p-3 hover:bg-gray-900 rounded-lg">💬 Auto Captions</button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 p-6 flex flex-col gap-6">
            <div class="canvas flex-1 rounded-2xl flex items-center justify-center text-gray-600">
                <p>Drag & Drop Your Footage Here</p>
            </div>

            <!-- Templates Section (Professional Look) -->
            <section class="h-48">
                <h2 class="text-sm font-semibold mb-3">Trending Templates</h2>
                <div class="flex gap-4 overflow-x-auto pb-4">
                    <div class="template-card min-w-[160px] h-32 bg-gray-800 rounded-xl flex items-end p-3" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/300/200'); background-size: cover;">
                        <span>Retro 90s</span>
                    </div>
                    <div class="template-card min-w-[160px] h-32 bg-gray-800 rounded-xl flex items-end p-3" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/301/200'); background-size: cover;">
                        <span>Cinematic</span>
                    </div>
                    <div class="template-card min-w-[160px] h-32 bg-gray-800 rounded-xl flex items-end p-3" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/302/200'); background-size: cover;">
                        <span>Urdu Vibes</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
