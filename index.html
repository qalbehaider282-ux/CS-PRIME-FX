<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vertex Advanced Studio</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #ff0055; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 400px; background-color: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        .header { padding: 15px; font-weight: bold; color: #fff; background: #222; text-align: center; border-bottom: 1px solid #333; }
        .tabs { display: flex; background: #111; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: var(--accent); color: #fff; background: #1a1a1a; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .section { margin-bottom: 25px; }
        h4 { color: var(--accent); margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { background-color: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        button:hover { background-color: var(--accent); border-color: var(--accent); }
        input[type="text"], select { width: 100%; padding: 10px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        #workspace { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #080808; position: relative; }
        #preview { width: 70%; height: 65%; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; background: #000; }
        .footer { position: absolute; bottom: 20px; }
        .export-btn { padding: 15px 40px; background-color: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">VERTEX ADVANCED STUDIO</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('templates')">Templates</button>
            <button class="tab-btn" onclick="switchTab('effects')">Effects</button>
            <button class="tab-btn" onclick="switchTab('adjust')">Adjust</button>
            <button class="tab-btn" onclick="switchTab('text')">Text</button>
        </div>

        <div class="content" id="tab-templates">
            <div class="section">
                <h4>Smart Templates</h4>
                <div class="grid">
                    <button style="grid-column: span 2;">Auto Beat</button>
                    <button style="grid-column: span 2;">Transition Mix</button>
                    <button style="grid-column: span 2;">Slide Show</button>
                    <button style="grid-column: span 2;">Cinematic</button>
                </div>
            </div>
        </div>

        <div class="content" id="tab-effects" style="display:none;">
            <div class="section">
                <h4>Video Enhancements</h4>
                <div class="grid">
                    <button>HDR Enhance</button>
                    <button>Denoise</button>
                    <button>Stabilize</button>
                    <button>Slow Mo</button>
                </div>
            </div>
            <div class="section">
                <h4>Special FX</h4>
                <div class="grid">
                    <button>VHS</button>
                    <button>Glitch</button>
                    <button>RGB</button>
                    <button>Neon</button>
                    <button>Blur</button>
                    <button>Shadow</button>
                    <button>Mosaic</button>
                    <button>Glow</button>
                </div>
            </div>
        </div>

        <div class="content" id="tab-adjust" style="display:none;">
            <div class="section">
                <h4>Color & Light</h4>
                <input type="text" placeholder="Brightness">
                <input type="text" placeholder="Contrast">
                <input type="text" placeholder="Saturation">
                <input type="text" placeholder="Temperature">
                <input type="text" placeholder="Highlights">
                <input type="text" placeholder="Shadows">
            </div>
        </div>

        <div class="content" id="tab-text" style="display:none;">
            <div class="section">
                <h4>Typography Styles</h4>
                <input type="text" placeholder="Type text here...">
                <div class="grid">
                    <button>Neon Font</button>
                    <button>3D Font</button>
                    <button>Glow Font</button>
                    <button>Shadow Font</button>
                </div>
            </div>
        </div>
    </div>

    <div id="workspace">
        <div id="preview">
            <p style="color:#555;">Media Preview Area</p>
        </div>
        <div class="footer">
            <button class="export-btn">Export Video</button>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content').forEach(content => content.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).style.display = 'block';
        }
    </script>
</body>
</html>
