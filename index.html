<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C's Prime FX | Elite Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root { --bg: #050505; --panel: #0d0d0d; --accent: #ffffff; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #ccc; height: 100vh; display: flex; flex-direction: column; }

        /* Header - Premium Minimalist */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--border); background: #000; }
        .logo { font-size: 20px; font-weight: 300; letter-spacing: 4px; color: white; }
        .btn-export { background: white; color: black; padding: 8px 20px; border-radius: 4px; font-weight: 600; font-size: 12px; cursor: pointer; border: none; }
        
        /* Main */
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; }
        .canvas-area { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        
        /* Canvas */
        .canvas { flex: 1; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #080808; }
        
        /* Templates - CapCut Style */
        .template-bar { height: 160px; display: flex; gap: 15px; overflow-x: auto; padding-top: 10px; }
        .template-item { min-width: 130px; height: 100px; background: #1a1a1a; border-radius: 6px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; border: 1px solid #333; }
        .template-item:hover { border-color: white; }
        
        /* Export Dropdown Style */
        .quality-select { background: #111; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 100%; margin-top: 10px; }
        .label { font-size: 10px; letter-spacing: 1px; color: #666; text-transform: uppercase; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">C's PRIME FX</div>
        <button class="btn-export" onclick="alert('Select Quality First')">EXPORT PROJECT</button>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <span class="label">Editing Suite</span>
            <div style="margin-bottom: 30px;">
                <button style="width:100%; background:none; border:1px solid #333; color:white; padding:10px; margin-bottom:10px; cursor:pointer;">Upload Footage</button>
                <span class="label" style="margin-top:20px;">Export Quality</span>
                <select class="quality-select">
                    <option>720p HD</option>
                    <option selected>1080p Full HD</option>
                    <option>4K Ultra HD</option>
                </select>
            </div>
            
            <span class="label">Manual Adjustments</span>
            <input type="range" style="width:100%; margin-bottom:15px;">
            <input type="range" style="width:100%;">
        </aside>

        <main class="canvas-area">
            <div class="canvas">Preview Workspace</div>
            
            <section>
                <span class="label">Trending Templates</span>
                <div class="template-bar">
                    <div class="template-item"></div>
                    <div class="template-item"></div>
                    <div class="template-item"></div>
                    <div class="template-item"></div>
                </div>
            </section>
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
